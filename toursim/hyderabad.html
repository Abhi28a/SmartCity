<!DOCTYPE html>
<html>
  <head>
    <script>
      // Function to show an alert when the user right-clicks
      function showAlert(event) {
          event.preventDefault(); // Prevent the default context menu
          alert("Right-clicking is disabled on this page.");
      }
      
      // Attach the showAlert function to the contextmenu event
      document.addEventListener("contextmenu", showAlert);
  </script>
<style>
* {
  box-sizing: border-box;
}

body {
    height: 100%;
  margin: 0;
  font-family: Arial;
}


.row {
  display: -ms-flexbox; /* IE10 */
  display: flex;
  -ms-flex-wrap: wrap; /* IE10 */
  flex-wrap: wrap;
  padding: 0 4px;
}

/* Create four equal columns that sits next to each other */
.column {
  -ms-flex: 25%; /* IE10 */
  flex: 25%;
  max-width: 25%;
  padding: 0 4px;
}

.column img {
  margin-top: 8px;
  vertical-align: middle;
  width: 100%;
}
.navbar {
    display: flex;
    justify-content: center;
    background: linear-gradient(45deg, #DFB6B2, #FBE4D8);
    font-size: large;
    padding: 10px;
}

.nav-item {
    text-decoration: none;
    color: #FFF; /* Change this to your desired text color */
    margin: 0 15px;
    padding: 5px 10px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}

.nav-item:hover {
    color: #102C57;
}
/* Responsive layout - makes a two column-layout instead of four columns */
@media screen and (max-width: 800px) {
  .column {
    -ms-flex: 50%;
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .column {
    -ms-flex: 100%;
    flex: 100%;
    max-width: 100%;
  }
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(45deg,#06142E, #1B3358, #473E66, #BD83B8, #F5D7DB, #F1916D);
  background-size: 600% 600%;
  animation: gradientMotion 10s linear infinite;
}

@keyframes gradientMotion {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

h1 {
  color: #FBE4D8; /* Text color */
  font-size: 200px; /* Change this to your desired text size */
  margin: 0;
}

h1:hover{
  overflow: hidden; /* Clip content to fit within the border-radius */
  transition: all 0.3s ease-in-out; /* Transition for color and border-radius changes */
  border-radius: 40px;
  border-style: outset;
  padding: 20px;
}



</style>
