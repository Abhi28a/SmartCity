<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Function to show an alert when the user right-clicks
    function showAlert(event) {
        event.preventDefault(); // Prevent the default context menu
        alert("Right-clicking is disabled on this page.");
    }
    
    // Attach the showAlert function to the contextmenu event
    document.addEventListener("contextmenu", showAlert);
</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #F8F0E5;
  overflow: hidden;
}

.background-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  animation: animateBackground 20s linear infinite;
  background-image: linear-gradient(45deg, #A2D2FF, #FEF9EF, #FF865E, #FEE440);
  background-size: 400% 400%;
}

@keyframes animateBackground {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

.container {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 450px;
  height: 400px;
  padding: 20px;
  background-color: #EADBC8;
  border-radius: 30px;
  box-shadow: 5px 5px 15px #102C57;
}

input[type=text], input[type=password] {
  width: 100%;
  padding: 15px;
  margin: 5px 0 22px 0;
  border: none;
  border-radius: 10px;
  background: #DAC0A3;
}

input[type=text]:focus, input[type=password]:focus {
  outline: none;
}

button {
  background-color: #102C57;
  color: white;
  border-radius: 20px;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
}

button:hover {
  opacity: 0.8;
}

a {
  color: #102C57;
}
h1 {
  text-align: center;
}

</style>
</head>
<body>

<div class="background-animation"></div>

<div class="container">
<h1>Login</h1>
<form action="" method="post">
<label for="username"><i class="far fa-user-circle icon"></i> <b>Username</b></label>
<input type="text" placeholder="Enter Username" name="username" id="username" required>

<label for="password"><i class="fas fa-lock login-icon"></i> <b>Password</b></label>
<input type="password" placeholder="Enter Password" name="password" id="password" required>

<button type="submit" formaction="/">Login</button>
<a href="#">Forgot password?</a> | <a href="register.html">Register</a>
</form>
</div>

</body>
</html>
