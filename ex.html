<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Function to show an alert when the user right-clicks
        function showAlert(event) {
            event.preventDefault(); // Prevent the default context menu
            alert("Right-clicking is disabled on this page.");
        }
        
        // Attach the showAlert function to the contextmenu event
        document.addEventListener("contextmenu", showAlert);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Example</title>
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: #333;
            padding: 10px;
        }

        .nav-item {
            text-decoration: none;
            color: #FFF;
            margin: 0 15px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .nav-item:hover {
            background-color: #EADBC8;
            color: #102C57;
        }

        /* Hamburger icon styles */
        .hamburger {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            padding: 10px;
        }

        .bar {
            width: 30px;
            height: 3px;
            background-color: #FFF;
            margin: 3px 0;
            transition: 0.4s;
        }

        /* Dropdown styles */
        .dialog-box {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .dropdown-content {
            flex-direction: column;
            position: absolute;
            background-color: #333;
            min-width: 200px;
            right: 0;
            z-index: 1;
            border-radius: 5px;
        }

        .dropdown-item {
            padding: 10px;
            color: #FFF;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .dropdown-item:hover {
            background-color: #EADBC8;
        }

        .hero-image {
            width: 100%;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1533587851505-d119e13fa0d7?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn-container {
            margin-top: 20px;
        }

        .b {
            padding: 10px 20px;
            background-color: #333;
            color: #FFF;
            text-decoration: none;
            border-radius: 5px;
        }

        .b:hover {
            background-color: #EADBC8;
            color: #102C57;
        }

        .icon-boxes {
            padding: 80px 0;
            background-color: #F6F4EB;
        }

        .icon-box {
            position: relative;
            background: #91C8E4;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(78, 78, 78, 0.2);
            padding: 30px;
            transition: all 0.4s ease-in-out;
        }

        .icon-box:hover {
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0px 0px 40px rgba(78, 78, 78, 0.4);
        }

        .icon img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            transition: background 0.4s;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-top: 20px;
            color: #749BC2;
        }

        .description {
            font-size: 14px;
            line-height: 24px;
            margin-top: 15px;
            color: #749BC2;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #DAC0A3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s;
        }

        .button:hover {
            background: #BA9C7A;
        }

        @media (max-width: 992px) {
            .icon-boxes {

            }

            .icon-box {
                margin-bottom: 30px;
            }

<body>
<div class="navbar">
    <a href="tourism.html" class="nav-item">Home</a>

    <a href="feedback.html" class="nav-item">Bucket List</a>
    <div class="nav-item dropdown">
        <div class="hamburger" onclick="toggleDropdown()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="dialog-box" id="dialogBox">
            <div class="dropdown-content">
                <div class="dropdown-item">Item 1</div>
                <div class="dropdown-item">Item 2</div>
                <div class="dropdown-item">Item 3</div>
                <div class="close-button" onclick="closeDialog()">Close</div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleDropdown() {
        var dialogBox = document.getElementById("dialogBox");
        dialogBox.style.display = dialogBox.style.display === "block" ? "none" : "block";
    }

    function closeDialog() {
        var dialogBox = document.getElementById("dialogBox");
        dialogBox.style.display = "none";
    }

    // Close the dropdown when clicking outside of it
    window.addEventListener("click", function (event) {
        var dialogBox = document.getElementById("dialogBox");
        if (!event.target.matches(".hamburger") && !event.target.matches(".dropdown-item")) {
            dialogBox.style.display = "none";
        }
    });
</script>
